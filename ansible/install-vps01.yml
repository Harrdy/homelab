---
- hosts: all

  tasks:
  - name: Create Folder nginxproxymanager
    path: /root/nginxproxymanager2/
    state: directory

  - name: copy Docker Compose files
    copy:
      src: ../docker/vps01/nginxproxymanager/{{ item }}
      dest: /root/nginxproxymanager2/{{ item }}
    loop:
    - docker-compose.yml

